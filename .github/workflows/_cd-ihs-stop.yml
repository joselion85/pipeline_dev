# =============================================================================
# CD Reusable Workflow for WAS Deployment to STOP the IHS
# =============================================================================
# This workflow is designed to be reusable and can be called from other 
# workflows for stopping the IHS in the UAT environment.
#
# Workflow stages:
# 1. Stop IHS
# 2. Summary

name: 'CD - WAS Stop IHS Pipeline UAT'
on:
  workflow_call:
    inputs:
      application:
        description: 'Application name for stopping IHS'
        required: true
        type: string
      oc:
        description: 'OC number'
        required: false
        type: string
      environment:
        description: 'Environment to stop IHS'
        required: true
        type: string
        default: 'uat'
      site:
        description: 'Site to stop IHS'
        required: true
        type: string
        default: 'site1'

jobs:
  stop_ihs:
    name: 'Stop IHS'
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v5

      - name: 'Stop IHS'
        id: stop-ihs
        uses: ./.github/actions/ihs-stop
        with:
          application: ${{ inputs.application }}
          environment: ${{ inputs.environment }}
          site: ${{ inputs.site }}

  summary:
    name: 'Summary'
    runs-on: ubuntu-latest
    needs: stop_ihs
    if: always()
    steps:
      - name: 'Generate Summary'
        id: generate-summary
        run: |
          echo "Generating summary for IHS stop operation..."
          # Add commands to generate summary here
          echo "::notice::IHS stop operation completed for application: ${{ inputs.application }}, Environment: ${{ inputs.environment }}, Site: ${{ inputs.site }}"
  