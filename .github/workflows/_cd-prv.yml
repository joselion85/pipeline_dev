# =============================================================================
# CD Reusable Workflow for WAS Deployment
# =============================================================================
# This workflow is designed to be reusable and can be called from other 
# workflows for deploying applications to UAT environment. 
#
# El caller invoca este reusable por cada SITE en secuencia.

# Workflow stages:
# 1. Prepare
# 2. Backup
# 3. Copy Artifacts
# 4. Stop IHS (Workflow Call)
# 5. Deploy to Site
# 6. Start IHS (Workflow Call)
# 7. Deployment Summary

name: 'CD - WAS Deployment Pipeline UAT'
on:
  workflow_call:
    inputs:
      application:
        description: 'Application name for deployment'
        required: true
        type: string
      oc:
        description: 'OC number'
        required: false
        type: string
      environment:
        description: 'Environment to deploy to'
        required: true
        type: string
        default: 'uat'
      site:
        description: 'Site to deploy to'
        required: true
        type: string
        default: 'site1'
  # Temporary workflow_dispatch for testing purposes
  workflow_dispatch:
    inputs:
      application:
        description: 'Application name for deployment'
        required: true
        type: string
      oc:
        description: 'OC number'
        required: false
        type: string
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        default: 'uat'
        options:
          - dev 
          - uat
          - sit
          - prod
      site:
        description: 'Site to deploy to'
        required: true
        type: choice
        default: 'site1'
        options:
          - site1
          - site2

jobs:
  # ===========================================================================
  # 1. Prepare
  # Get workflow information, checkout code, and prepare deployment variables.
  prepare:
    name: 'Prepare Deployment'
    runs-on: ubuntu-latest
    outputs:
      # deployment-runner-group: ${{ steps.prepare.outputs.deployment-runner-group }}
      # prv-deployment-runner-group: ${{ steps.prepare.outputs.prv-deployment-runner-group }}
      # github-environment: ${{ steps.prepare.outputs.github-environment }}
      # lower-application: ${{ steps.prepare.outputs.lower-application }}
      upper-application: ${{ steps.prepare.outputs.upper-application }}
      # component-name: ${{ steps.prepare.outputs.component-name }}
      was_servers: ${{ steps.prepare.outputs.was_servers }}
      ihs_servers: ${{ steps.prepare.outputs.ihs_servers }}
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v5
      
      - name: 'Prepare WAS Deployment'
        id: prepare
        run: |
          echo "Checking out code for ${{ inputs.application }}"
          echo "Resolve servers based on Environment, Site and Microservice"

          LOWER_APP=$(echo "${{ inputs.application }}" | tr '[:upper:]' '[:lower:]')
          ENV="${{ inputs.environment }}"
          SITE="${{ inputs.site }}"

          WAS_SERVERS=$(jq -r --arg env "$ENV" --arg site "$SITE" \
            '.[$env][$site].was | join(",")' config/server.json)
          IHS_SERVERS=$(jq -r --arg env "$ENV" --arg site "$SITE" \
            '.[$env][$site].ihs | join(",")' config/server.json)

          echo "WAS servers for ${ENV}/${SITE}: ${WAS_SERVERS}"
          echo "IHS servers for ${ENV}/${SITE}: ${IHS_SERVERS}"

          echo "lower-application=${LOWER_APP}" >> "$GITHUB_OUTPUT"
          echo "was_servers=${WAS_SERVERS}" >> "$GITHUB_OUTPUT"
          echo "ihs_servers=${IHS_SERVERS}" >> "$GITHUB_OUTPUT"


      - name: 'Artifactory Login'
        id: artifactory-login
        run: |
          echo "Logging into Artifactory for ${{ github.event.inputs.application }}"
          # Add your commands to log into Artifactory here  
        # uses: ibkpe-platform-org/dso-was-reusable/.github/actions/artifactory-login
        # uses: ./github/actions/artifactory-login                
        # with:
        #   application: ${{ steps.prepare.outputs.lower-application }}
        #   artifactory-username: ${{ env.ARTIFACTORY_USER_NAME }}
        # env:
        #   ARTIFACTORY_USER_PASSWORD: ${{ secrets.ARTIFACTORY_TOKEN }}
    
      - name: Download build artifacts from Artifactory
        run: |
          echo "Downloading build artifacts for ${{ github.event.inputs.application }} from Artifactory"
          # Add your commands to download artifacts here
        continue-on-error: false

      - name: Generate Evidence Summary
        run: |
          echo "Generating evidence summary for ${{ github.event.inputs.application }} deployment"
          # Add your commands to generate evidence summary here
    
  backup:
    name: 'Backup Current Deployment'
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v5

      - name: 'Backup Current Deployment'
        run: |
          echo "Backing up current deployment of ${{ github.event.inputs.application }} in ${{ github.event.inputs.environment }}"
          # Add your backup commands here

  copy_artifacts:
    name: 'Copy Artifacts to Deployment Server'
    needs: backup
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v5

      - name: 'Copy Artifacts'
        run: |
          echo "Copying artifacts for ${{ github.event.inputs.application }} to deployment server"
          # Add your commands to copy artifacts here

  ihs_stop:
    name: 'Stop IHS'
    needs: copy_artifacts
    uses: ./.github/workflows/_cd-ihs-stop.yml
    with:
      application: ${{ github.event.inputs.application }}
      oc: ${{ github.event.inputs.oc }}
      environment: ${{ github.event.inputs.environment }}
      site: ${{ github.event.inputs.site }}

  deploy_site:
    name: 'Deploy to Site'
    needs: [copy_artifacts, ihs_stop]
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v5

      - name: "Login to DMGR and deploy .EAR"
        run: |
          echo "Logging into DMGR for ${{ github.event.inputs.application }} in ${{ github.event.inputs.environment }}"
          # Add your commands to log into DMGR here

      - name: 'Deploy libraries to WAS'
        run: |
          echo "Deploying ${{ github.event.inputs.application }} to Site ${{ github.event.inputs.site }} in ${{ github.event.inputs.environment }}"
          # Add your deployment commands for Site ${{ github.event.inputs.site }} here

      - name: "Restart WAS servers for ${{ github.event.inputs.site }} in ${{ github.event.inputs.environment }}"
        run: |
          echo "Restarting WAS servers for Site ${{ github.event.inputs.site }} in ${{ github.event.inputs.environment }}"
          # Add your commands to restart WAS servers here

      - name: 'Verify Deployment'
        run: |
          echo "Verifying deployment of ${{ github.event.inputs.application }} to Site ${{ github.event.inputs.site }} in ${{ github.event.inputs.environment }}"
          echo "::notice::Verifying deployment of ${{ github.event.inputs.application }} to Site ${{ github.event.inputs.site }} in ${{ github.event.inputs.environment }}"
          # Add your verification commands here

  ihs_start:
    name: 'Start IHS'
    needs: [ihs_stop, deploy_site]
    uses: ./.github/workflows/_cd-ihs-start.yml
    with:
      application: ${{ github.event.inputs.application }}
      oc: ${{ github.event.inputs.oc }}
      environment: ${{ github.event.inputs.environment }}
      site: ${{ github.event.inputs.site }}


  summary:
    name: 'Generate Deployment Summary and evidence'
    needs: [deploy_site, ihs_stop, ihs_start]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v5

      - name: 'Generate Summary and evidence'
        run: |
          echo "::notice::Generating deployment summary for ${{ github.event.inputs.application }} in ${{ github.event.inputs.environment }}"
          echo "Generating deployment summary for ${{ github.event.inputs.application }} in ${{ github.event.inputs.environment }}"
          # Add your commands to generate a summary here
      
      - name: 'Upload Summary and evidence to repo'
        run: |
          echo "Uploading deployment summary for ${{ github.event.inputs.application }} in ${{ github.event.inputs.environment }}"
      
      - name: "Cleanup ephemeral resources"
        run: |
          echo "Cleaning up ephemeral resources for ${{ github.event.inputs.application }} in ${{ github.event.inputs.environment }}"
          # Add your cleanup commands here
