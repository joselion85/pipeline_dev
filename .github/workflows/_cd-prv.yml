name: 'WAS Deployment CD Pipeline UAT'
on:
  workflow_call:
    inputs:
      application:
        description: 'Application name for deployment'
        required: true
        type: string
      oc:
        description: 'OC number'
        required: true
        type: string
      environment:
        description: 'Environment to deploy to'
        required: true
        type: string
        default: 'uat'
  workflow_dispatch:
    inputs:
      application:
        description: 'Application name for deployment'
        required: true
        type: string
      oc:
        description: 'OC number'
        required: true
        type: string
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        default: 'uat'
        options:
          - dev 
          - uat
          - sit
          - prod

